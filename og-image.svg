<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4FBF8"/>
      <stop offset="100%" style="stop-color:#E1F5EE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0F6E56"/>
      <stop offset="100%" style="stop-color:#3DB88A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Green accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#1D9E75"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C8EFE3" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Logo icon (simplified C-arc) -->
  <g transform="translate(80, 80)">
    <path d="M54 8 A36 36 0 1 0 54 72" stroke="#1D9E75" stroke-width="7" fill="none" stroke-linecap="round"/>
    <circle cx="54" cy="40" r="7" fill="#1D9E75"/>
    <circle cx="78" cy="22" r="4.5" fill="#0F6E56"/>
    <circle cx="83" cy="40" r="4.5" fill="#0F6E56"/>
    <circle cx="78" cy="58" r="4.5" fill="#0F6E56"/>
    <line x1="60" y1="36" x2="75" y2="24" stroke="#5DCAA5" stroke-width="1.5"/>
    <line x1="61" y1="40" x2="78" y2="40" stroke="#5DCAA5" stroke-width="1.5"/>
    <line x1="60" y1="44" x2="75" y2="56" stroke="#5DCAA5" stroke-width="1.5"/>
  </g>
  
  <!-- Brand name -->
  <text x="190" y="111" font-family="Georgia, serif" font-size="28" font-weight="600" fill="#1D9E75">Cancer Drug</text>
  <text x="368" y="111" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#111210"> Evidence</text>
  
  <!-- Main headline -->
  <text x="80" y="280" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="400" fill="#111210">The Global Oncology</text>
  <text x="80" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-style="italic" fill="#1D9E75">Intelligence Platform</text>
  
  <!-- Subtext -->
  <text x="80" y="440" font-family="system-ui, sans-serif" font-size="26" fill="#4A4D48">228+ FDA &amp; EMA-Approved Cancer Therapies · 50 Tumor Types</text>
  
  <!-- Stats pills -->
  <rect x="80" y="490" width="200" height="52" rx="10" fill="#1D9E75" opacity="0.12"/>
  <text x="180" y="522" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F6E56" text-anchor="middle">228+ Drugs</text>
  
  <rect x="296" y="490" width="200" height="52" rx="10" fill="#1D9E75" opacity="0.12"/>
  <text x="396" y="522" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F6E56" text-anchor="middle">50 Tumor Types</text>
  
  <rect x="512" y="490" width="200" height="52" rx="10" fill="#1D9E75" opacity="0.12"/>
  <text x="612" y="522" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#0F6E56" text-anchor="middle">600+ Trials</text>
  
  <!-- Domain -->
  <text x="1120" y="600" font-family="system-ui, sans-serif" font-size="20" fill="#6B6E68" text-anchor="end">cancerdrugevidence.com</text>
</svg>